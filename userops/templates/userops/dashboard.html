{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UserOps Dashboard</title>
  <link rel="stylesheet" href="{% static 'userops/dashboard.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.5.2/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.5.2/dist/js/tom-select.complete.min.js"></script>
  <script src="{% static 'userops/dashboard.js' %}" defer></script>
</head>
<body>
  <main class="container">
    <div class="dashboard-header">
      <h2>UserOps Dashboard </h2>

      <div class="header-actions">
        <button type="button" id="goBackBtn" class="admin-btn secondary-btn">
          ← Back
        </button>
        <a class="admin-btn secondary-btn" href="/userops/progress_overview">
          Progress Overview
        </a>
        <a class="admin-btn" href="/admin/auth/user/import/" target="_blank" rel="noopener noreferrer">
          Add Users
        </a>
      </div>
    </div>

    <section class="card">
      <h2>Metadata Filters</h2>
      <div id="metadataFiltersContainer" class="grid"></div>
      <div class="filter-actions">
        <button id="preview-btn" type="button">Preview Users</button>
        <button id="resetFiltersBtn" type="button" class="admin-btn outline-btn">Reset Filters</button>
      </div>
    </section>

    <section class="card">
      <h2>Preview Results</h2>
      <p id="preview-count">Count: 0</p>
      <div class="preview-actions">
        <button id="selectAllBtn" type="button" class="admin-btn secondary-btn">Select All</button>
        <button id="unselectAllBtn" type="button" class="admin-btn secondary-btn">Unselect All</button>
        <span id="selectedCount" class="muted">Selected: 0</span>
      </div>
      <div class="preview-container">
        <div class="table-wrap">
          <table id="preview-table">
            <thead>
              <tr id="preview-table-header-row"></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Bulk Enroll</h2>
      <div class="grid">
        <label>action
          <select id="bulk-action">
            <option value="enroll">enroll</option>
            <option value="unenroll">unenroll</option>
          </select>
        </label>
        <label class="inline"><input type="checkbox" id="bulk-auto_enroll" checked> auto_enroll</label>
        <label class="inline"><input type="checkbox" id="bulk-email_students"> email_students</label>
      </div>

      <div class="course-picker">
        <label for="courseSearch"><strong>Select Course(s)</strong></label>
        <input id="courseSearch" type="text" placeholder="Search courses..." class="course-search" />

        <div id="courseList" class="course-list">
          <!-- JS renders grouped checkboxes here -->
        </div>

        <div class="course-actions">
          <button type="button" id="selectAllCoursesBtn" class="admin-btn secondary-btn">Select All</button>
          <button type="button" id="clearAllCoursesBtn" class="admin-btn secondary-btn">Clear All</button>
          <span id="selectedCoursesCount" class="muted">Selected: 0</span>
        </div>
      </div>

      <div class="grid">
        <label>cohorts (optional, one per line)
          <textarea id="bulk-cohorts" rows="4" placeholder="cohortA"></textarea>
        </label>
      </div>

      <p id="execute-scope-hint" class="muted">Enrolling all matched users</p>
      <button id="execute-btn" type="button">Execute Bulk Enroll</button>
    </section>

    <section class="card">
      <h2>Output Summary</h2>
      <div id="status-box" class="status"></div>
    </section>
  </main>
</body>
</html>
